<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <header>
        <h2>
            Tic Tac Toe
        </h2>
    </header>
    <main>
        <table>
            <tr>
                <td><button class = "box" data-index = "7"></button></td>
                <td><button class = "box" data-index = "8"></button></td>
                <td><button class = "box" data-index = "9"></button></td>
            </tr>
            <tr>
                <td><button class = "box" data-index = "4"></button></td>
                <td><button class = "box" data-index = "5"></button></td>
                <td><button class = "box" data-index = "6"></button></td>
            </tr>
            <tr>
                <td><button class = "box" data-index = "1"></button></td>
                <td><button class = "box" data-index = "2"></button></td>
                <td><button class = "box" data-index = "3"></button></td>
            </tr>    
        </table>
        <p id = "status">Status</p>
        <button id = "rG">
            Reset Game
        </button>
    </main>
    <footer>
        Made using HTML &bull; CSS &bull; JS.
        <script src = "script.js"></script>
    </footer>
</body>
</html>
